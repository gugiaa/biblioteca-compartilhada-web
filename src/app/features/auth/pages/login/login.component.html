<div class="login-page">
  <div class="login-container animate-fade-in">
    
    <div class="login__branding">
      <div class="login__logo">
        <mat-icon class="login__logo-icon">local_library</mat-icon>
      </div>
      <h1 class="login__title">Smart Library</h1>
      <p class="login__subtitle">Plataforma Inteligente de Biblioteca</p>
    </div>

    <mat-card class="login__card">
      <mat-card-content>
        <h2 class="login__card-title">Portal de Acesso</h2>
        <p class="login__card-subtitle">Ambiente temporário de homologação. Escolha um perfil para entrar:</p>

        <div class="login__quick-access">
          <button type="button" class="login__role-card login__role-card--admin" (click)="loginAdmin()">
            <div class="login__role-icon-wrapper">
              <mat-icon>admin_panel_settings</mat-icon>
            </div>
            <div class="login__role-info">
              <h3>Entrar como Administrador</h3>
              <p>Gerencie o acervo de livros, registre e devolda empréstimos, controle membros e audite logs.</p>
            </div>
            <mat-icon class="login__role-arrow">chevron_right</mat-icon>
          </button>

          <button type="button" class="login__role-card login__role-card--user" (click)="loginUser()">
            <div class="login__role-icon-wrapper">
              <mat-icon>account_circle</mat-icon>
            </div>
            <div class="login__role-info">
              <h3>Entrar como Membro</h3>
              <p>Visualize o catálogo de livros disponíveis, consulte seus empréstimos ativos e veja seu perfil.</p>
            </div>
            <mat-icon class="login__role-arrow">chevron_right</mat-icon>
          </button>
        </div>
      </mat-card-content>
    </mat-card>

    <p class="login__footer">
      © 2026 Smart Library — Protótipo de Homologação
    </p>
  </div>
</div>
