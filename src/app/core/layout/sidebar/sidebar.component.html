<aside class="sidebar">
  <nav class="sidebar__nav">
    <div class="sidebar__section">
      <span class="sidebar__section-title">MENU PRINCIPAL</span>
      @for (item of navItems(); track item.route) {
        <a
          class="sidebar__item"
          [routerLink]="item.route"
          routerLinkActive="sidebar__item--active"
        >
          <mat-icon class="sidebar__item-icon">{{ item.icon }}</mat-icon>
          <span class="sidebar__item-label">{{ item.label }}</span>
        </a>
      }
    </div>

    <mat-divider></mat-divider>

    <div class="sidebar__section">
      <span class="sidebar__section-title">CONTA</span>
      @for (item of secondaryNavItems(); track item.route) {
        <a
          class="sidebar__item"
          [routerLink]="item.route"
          routerLinkActive="sidebar__item--active"
        >
          <mat-icon class="sidebar__item-icon">{{ item.icon }}</mat-icon>
          <span class="sidebar__item-label">{{ item.label }}</span>
        </a>
      }
    </div>
  </nav>

  <div class="sidebar__footer">
    <div class="sidebar__library-info">
      <mat-icon class="sidebar__library-icon">location_on</mat-icon>
      <div>
        <span class="sidebar__library-name">Biblioteca Central</span>
        <span class="sidebar__library-address">Bloco A, Térreo</span>
      </div>
    </div>
  </div>
</aside>
