<mat-toolbar class="header">
  <div class="header__left">
    <button mat-icon-button class="header__menu-btn" aria-label="Menu">
      <mat-icon>menu</mat-icon>
    </button>
    <div class="header__logo">
      <mat-icon class="header__logo-icon">local_library</mat-icon>
      <span class="header__logo-text">Smart Library</span>
    </div>
  </div>

  <div class="header__center">
    <div class="header__search">
      <mat-icon class="header__search-icon">search</mat-icon>
      <input
        type="text"
        class="header__search-input"
        placeholder="Buscar livros, autores, ISBN..."
      />
    </div>
  </div>

  <div class="header__right">
    <button mat-icon-button aria-label="Notificações" [matBadge]="3" matBadgeColor="warn" matBadgeSize="small">
      <mat-icon>notifications_none</mat-icon>
    </button>

    <button mat-icon-button [matMenuTriggerFor]="userMenu" aria-label="Menu do usuário">
      <div class="header__avatar">
        <span>{{ userInitials() }}</span>
      </div>
    </button>

    <mat-menu #userMenu="matMenu">
      <div style="padding: 12px 16px; min-width: 220px;">
        <div style="font-weight: 600; color: var(--color-text-primary); font-size: var(--font-size-md);">{{ authService.currentUser()?.name }}</div>
        <div style="font-size: var(--font-size-xs); color: var(--color-text-secondary); margin-top: 2px;">{{ authService.currentUser()?.email }}</div>
      </div>
      <mat-divider></mat-divider>
      <button mat-menu-item>
        <mat-icon>person</mat-icon>
        <span>Meu Perfil</span>
      </button>
      <button mat-menu-item>
        <mat-icon>settings</mat-icon>
        <span>Configurações</span>
      </button>
      <mat-divider></mat-divider>
      <button mat-menu-item (click)="logout()">
        <mat-icon>logout</mat-icon>
        <span>Sair</span>
      </button>
    </mat-menu>
  </div>
</mat-toolbar>
